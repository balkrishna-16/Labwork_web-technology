<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>

<script>

function validateForm(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var pass=document.getElementById("pass").value;
var cpass=document.getElementById("cpass").value;
var phone=document.getElementById("phone").value;
var faculty=document.getElementById("faculty").value;

if(name.length<3){
document.getElementById("nameError").innerHTML="Enter valid name";
return false;
}

if(email.indexOf("@")==-1){
document.getElementById("emailError").innerHTML="Enter valid email";
return false;
}

if(pass.length<6){
document.getElementById("passError").innerHTML="Password must be 6 characters";
return false;
}

if(pass!=cpass){
document.getElementById("cpassError").innerHTML="Password not match";
return false;
}

if(isNaN(phone)){
document.getElementById("phoneError").innerHTML="Phone must be number";
return false;
}

var gender=document.querySelector('input[name="gender"]:checked');

if(!gender){
document.getElementById("genderError").innerHTML="Select gender";
return false;
}

if(faculty==""){
document.getElementById("facultyError").innerHTML="Select faculty";
return false;
}

alert("Form submitted successfully");

}

</script>
</head>

<body>

<h2>Student Registration Form</h2>

<form onsubmit="return validateForm()">

Name:<br>
<input type="text" id="name">
<br>
<small id="nameError"></small>
<br><br>

Email:<br>
<input type="text" id="email">
<br>
<small id="emailError"></small>
<br><br>

Password:<br>
<input type="password" id="pass">
<br>
<small id="passError"></small>
<br><br>

Confirm Password:<br>
<input type="password" id="cpass">
<br>
<small id="cpassError"></small>
<br><br>

Phone:<br>
<input type="text" id="phone">
<br>
<small id="phoneError"></small>
<br><br>

Gender:<br>
<input type="radio" name="gender">Male
<input type="radio" name="gender">Female
<br>
<small id="genderError"></small>
<br><br>

Faculty:<br>
<select id="faculty">
<option value="">Select</option>
<option>BCA</option>
<option>BBS</option>
<option>BBA</option>
</select>
<br>
<small id="facultyError"></small>
<br><br>

<input type="submit" value="Submit">

</form>

</body>
</html>
